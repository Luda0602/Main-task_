<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 1</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>
  <body>
    <form>
      <div class="form-row">
        <label for="firstNumber">First number</label>
        <input id="firstNumber" type="number" name="firstNumber" />
      </div>
      <div class="form-row">
        <label for="secondNumber">Second number</label>
        <input id="secondNumber" type="number" name="secondNumber" />
      </div>
      <button type="button" class="btn-plus">Додати</button>
      <button type="button" class="btn-minus">Відняти</button>
      <button type="button" class="btn-product">Помножити</button>
      <button type="button" class="btn-division">Поділити</button>

      <div class="form-row">
        <label for="result">Результат</label>
        <input id="result" type="number" name="result" readonly />
      </div>
    </form>

    <script src="../js/task-1.js"></script>
  </body>
</html>
